name: blackbox

services:
  postgres:
    # Docker Official Image: postgres:17.10-alpine3.24
    image: postgres:17.10-alpine3.24@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blackbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blackbox}
      POSTGRES_USER: ${POSTGRES_USER:-blackbox}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
    name: blackbox-postgres-data
